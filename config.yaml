network:
  # Discovery server endpoint. "registry" is the docker-compose service name (resolved via
  # Docker's internal DNS). Override with REGISTRY_URL env var for AWS multi-instance, where
  # the registry runs on a separate EC2 instance (set to its public/private IP).
  registry_url: "http://registry:5000"

  # Flask port on the registry container. Must match registry_url and EXPOSE in its Dockerfile.
  # Changing this requires regenerating compose: python scripts/generate_compose.py
  registry_port: 5000

  # Port each worker's gRPC server listens on. Must be identical across all workers because
  # peers look up addresses via the registry and always dial this same port.
  # Changing this requires regenerating compose: python scripts/generate_compose.py
  grpc_port: 50051

  # Peers each worker pushes weights to per round (k-push gossip). 0 = no-FL baseline.
  gossip_fanout: 7

  # After changing: python scripts/split_dataset.py && python scripts/generate_compose.py
  # AWS max: num_workers <= 8 (Learner Lab limit: 9 instances total, 1 for registry).
  num_workers: 8

federated_learning:
  # Hard cap; can terminate earlier via early_stopping_patience.
  total_rounds: 200

  # Local SGD steps per worker before gossip (H in DiLoCo). Higher H = less communication.
  # Experiment candidates: 100, 500, 1000
  inner_steps_H: 1000

  aggregation_strategy: "FedAvg"

  # Rounds without val_loss improvement before a worker stops. Set > total_rounds to disable.
  # Stopped workers deregister and are no longer gossip targets.
  early_stopping_patience: 10

  # Requires NVIDIA Container Toolkit. After changing: python scripts/generate_compose.py
  use_gpu: true

machine_learning:
  dataset: "femnist"
  # Bind-mounted from ./data/femnist/worker_<id>. Do not change without updating compose.
  data_dir: "/app/data/femnist"

  # false: 90/10 train/val. true: 80/10/10 train/val/local_test (written to local_test_result.json).
  # After changing: python scripts/split_dataset.py
  local_test_set: false

  # Reserves global_test_fraction of LEAF writers before any per-worker split.
  # All workers evaluate on this shared set every round — unbiased convergence metric.
  # After changing: python scripts/split_dataset.py
  global_test_set: true
  global_test_fraction: 0.10
  global_test_dir: "/app/data/femnist/global_test"

  batch_size: 32
  learning_rate: 0.001
  optimizer: "AdamW"
  clip_grad: 1.0       # L2 gradient clipping. 0 = disabled.
  label_smoothing: 0.1 # Soft targets for cross-entropy. 0 = disabled.
  dropout_conv: 0.25   # Spatial dropout after conv blocks. 0 = disabled.
  dropout_fc: 0.5      # Dropout before the FC classification layer. 0 = disabled.

metrics:
  enabled: true
  output_file: "metrics.csv"

aws:
  region: "us-east-1"
  # Learner Lab: vockey key is pre-created only in us-east-1.
  key_name: "vockey"
  key_path: "~/Downloads/labsuser.pem"

  # Pin all instances to the same AZ → intra-cluster gRPC traffic is free.
  # If launch fails with a capacity error, try us-east-1b (keep all instances in the same AZ).
  availability_zone: "us-east-1a"

  # Learner Lab max: t3.large (xlarge+ are terminated immediately).
  instance_type_worker: "t3.small"
  instance_type_registry: "t3.micro"
  instance_type_single: "t3.large"  # single EC2: all workers share one machine, needs more RAM.

  # EBS gp3 volumes ($0.08/GB/month, billed per instance).
  # Worker: OS+Docker+image+partition ≈ 7–8 GB used; billed × N instances (12 GB is safe, 20 is conservative).
  # Registry: OS+Docker+image ≈ 5 GB used. Single: OS+Docker+all partitions+images ≈ 11–12 GB used.
  volume_size_worker: 20
  volume_size_registry: 8
  volume_size_single: 20

  # Images are built directly on each EC2 instance via SCP + docker build (always up to date).

fault_injection:
  # Probability a gossip push is silently dropped before the gRPC call (simulates packet loss).
  drop_probability: 0.0

  # Probability a worker crashes (sys.exit(1)) after Phase B in a given round.
  crash_probability: 0.0

  # Seconds before an outgoing gRPC call times out and is marked failed.
  grpc_timeout_seconds: 5.0

  # Incoming model updates older than max_staleness rounds are rejected.
  max_staleness: 10
